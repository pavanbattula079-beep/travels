<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalloji Travels</title>

<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>

</head>

<body>

<header>
    <div class="logo">Kalloji Travels</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Destinations</a>
        <a href="#">Tours</a>
        <a href="#">Contact</a>
    </nav>
</header>


<section class="hero">

    <h1>Explore the World With Us</h1>
    <p>Book amazing travel experiences easily</p>

<div class="search-box">

<input type="text" placeholder="Where are you going?">

<input type="date">

<button onclick="searchTour()">Search</button>

</div>

</section>


<section class="destinations">

<h2>Popular Destinations</h2>

<div class="grid">

<div class="card">
<img src="images/paris.jpg">
<h3>Paris</h3>
</div>

<div class="card">
<img src="images/london.jpg">
<h3>London</h3>
</div>

<div class="card">
<img src="images/goa.jpg">
<h3>Goa</h3>
</div>

<div class="card">
<img src="images/delhi.jpg">
<h3>New Delhi</h3>
</div>

</div>

</section>


<section class="contact">

<h2>Contact Us</h2>

<form>

<input type="text" placeholder="Name">

<input type="email" placeholder="Email">

<input type="tel" placeholder="Mobile">

<textarea placeholder="Message"></textarea>

<button>Submit</button>

</form>

</section>


<footer>

<p>© 2026 Kalloji Travels</p>

</footer>

</body>
</html>
